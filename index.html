  <body style="margin: 0;">
    <style>
      /* Instant Critical CSS for New Loader */
      #initial-loader {
        position: fixed;
        inset: 0;
        background: #ffffff;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 999999;
        transition: opacity 0.5s ease-out, visibility 0.5s ease-out;
      }
      
      .loader-brand {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 32px;
        font-weight: 800;
        letter-spacing: -0.025em; /* tracking-tight */
        color: #0d0d0d; /* text-foreground */
        display: flex;
        align-items: center;
        margin-bottom: 25px; /* space between logo & bar */
      }
      
      .loader-brand span {
        color: #666666; /* text-muted-foreground */
      }

      /* Bar Container */
      .loader-bar-container {
        width: 200px;
        height: 3px;
        background-color: #e5e7eb; /* light gray track */
        border-radius: 4px;
        overflow: hidden;
      }

      /* Filling Bar */
      .loader-bar-fill {
        height: 100%;
        width: 0%;
        background-color: #0d0d0d; /* dark progress bar to match vibe */
        border-radius: 4px;
        /* Animation: exactly 3 seconds filling up */
        animation: fillBar 3s cubic-bezier(0.4, 0.0, 0.2, 1) forwards;
      }

      @keyframes fillBar {
        0% { width: 0%; }
        100% { width: 100%; }
      }

      /* When body gets .loaded class, hide loader */
      body.loaded #initial-loader {
        opacity: 0;
        visibility: hidden;
      }
    </style>

    <!-- Instant Render Preloader -->
    <div id="initial-loader">
      <div class="loader-brand">DENT<span>CITY</span></div>
      <div class="loader-bar-container">
        <div class="loader-bar-fill"></div>
      </div>
    </div>

    <!-- Main React App Mount Point -->
    <div id="root"></div>

    <script>
      // Automatically dismiss the loader at exactly 3 seconds.
      // This creates the exact "fills in 3 seconds then opens" experience.
      setTimeout(() => {
        document.body.classList.add('loaded');
        
        // Remove from DOM entirely out of sight
        setTimeout(() => {
          const loader = document.getElementById('initial-loader');
          if (loader) loader.remove();
        }, 600); // Wait for transition to finish
      }, 3000); // 3 seconds total wait time
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
